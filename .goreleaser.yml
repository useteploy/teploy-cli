version: 2

builds:
  - main: ./cmd/teploy
    binary: teploy
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "teploy_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc

brews:
  # Pin the formula name to `teploy` (the binary + what users install). Without
  # this, goreleaser derives it from the project/repo name — which became
  # `teploy-cli` after the repo rename and split the formula (a stale
  # `teploy-cli.rb` at 0.1.5 alongside the real `teploy.rb`). Keep it `teploy`.
  - name: teploy
    repository:
      owner: useteploy
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/useteploy/teploy-cli
    description: Zero-downtime Docker deploys to any server via SSH
    license: MIT
    install: |
      bin.install "teploy"

scoops:
  - name: teploy
    repository:
      owner: useteploy
      name: scoop-bucket
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/useteploy/teploy-cli
    description: Zero-downtime Docker deploys to any server via SSH
    license: MIT
