version: 2

builds:
  - main: ./cmd/teploy
    binary: teploy
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "teploy_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc

brews:
  - repository:
      owner: useteploy
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/useteploy/teploy-cli
    description: Zero-downtime Docker deploys to any server via SSH
    license: MIT
    install: |
      bin.install "teploy"

scoops:
  - repository:
      owner: useteploy
      name: scoop-bucket
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/useteploy/teploy-cli
    description: Zero-downtime Docker deploys to any server via SSH
    license: MIT
