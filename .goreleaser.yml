version: 2

builds:
  - main: ./cmd/teploy
    binary: teploy
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    name_template: "teploy_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

changelog:
  sort: asc

# NOTE (2026-05-29): goreleaser 2.16 flags `brews:` as deprecated but does
# not yet ship a 1:1 replacement (homebrew_casks rejects `install:`; no
# homebrew_formulae key exists). Leaving as-is until goreleaser publishes a
# clean migration target; release path still works (deprecation, not error).
brews:
  # Pin the formula name to `teploy` (the binary + what users install). Without
  # this, goreleaser derives it from the project/repo name — which became
  # `teploy-cli` after the repo rename and split the formula (a stale
  # `teploy-cli.rb` at 0.1.5 alongside the real `teploy.rb`). Keep it `teploy`.
  - name: teploy
    repository:
      owner: useteploy
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/useteploy/teploy-cli
    description: Zero-downtime Docker deploys to any server via SSH
    license: MIT
    install: |
      bin.install "teploy"

scoops:
  - name: teploy
    repository:
      owner: useteploy
      name: scoop-bucket
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/useteploy/teploy-cli
    description: Zero-downtime Docker deploys to any server via SSH
    license: MIT
